# Configuración del proyecto Quarto.
# output-dir: docs  -> la web renderizada se guarda en la carpeta docs/,
# que es la que GitHub Pages publicará más adelante.
project:
  output-dir: docs
  # Renderiza SOLO el dashboard. Así PROYECTO.md (documento interno de trabajo)
  # y el README NO se publican como páginas del sitio.
  render:
    - index.qmd

# Título por defecto del sitio.
lang: es
